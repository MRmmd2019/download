          elif "tar" in fmt_used:
              extract_hint = f"2. Run: `tar xf {folder}.{fmt_used}`"
          dl_note = f"1. **Download ALL {parts_count} parts** into the same folder." \
                    if int(parts_count) > 1 else "1. Download the archive."
          pw_note = "3. 🔑 Enter password when prompted." if pw_label != "🔓 No" else ""
          content = f"""# 📦 {orig_name} — Compressed Archive

          > Saved: {ts}  |  Format: **{fmt_used}**  |  Parts: **{parts_count}**

          ---

          ## 📄 Archive Information
          | Property           | Value                           |
          |--------------------|---------------------------------|
          | Original file      | `{orig_name}`                   |
          | Original size      | {orig_hr}                       |
          | Archive size       | {arc_hr} ({ratio}% of orig)     |
          | Format used        | `{fmt_used}`                    |
          | Parts              | {parts_count}                   |
          | Password           | {pw_label}                      |
          | SHA-256 (original) | `{chksum}`                      |
          | Compression level  | {clevel}                        |

          ---

          ## 🔗 Download Links
          | # | Part | Size | Link |
          |---|------|------|------|
          {links}

