      # ── 7. Incremental commit & push ──────────────────────────────────────────
      - name: Commit and push results
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          BRANCH="${BRANCH}"
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)

          echo "🔄 Syncing with remote..."
          git fetch origin "$BRANCH"
          git reset --hard "origin/$BRANCH"

          mkdir -p DOWNLOAD
          cp -r "$BACKUP_DIR"/* DOWNLOAD/ 2>/dev/null || true

          # Collect files: metadata first, then data files
          declare -a ALL_FILES=()
          while IFS= read -r -d '' f; do
            ALL_FILES+=("$f")
          done < <(find DOWNLOAD -type f \
                    \( -name "README.md" -o -name "README_FA.md" \
                       -o -name "SHA256SUMS" -o -name "ERROR_REPORT.md" \
                       -o -name "summary.json" \) \
                    -print0 | sort -z)
          while IFS= read -r -d '' f; do
            ALL_FILES+=("$f")
          done < <(find DOWNLOAD -type f \
                    ! -name "README.md" ! -name "README_FA.md" \
                    ! -name "SHA256SUMS"  ! -name "ERROR_REPORT.md" \
                    ! -name "summary.json" \
                    -print0 | sort -z)

          TOTAL_FILES="${#ALL_FILES[@]}"
          echo "📁 Files to commit: ${TOTAL_FILES}"

          if [ "$TOTAL_FILES" -eq 0 ]; then
            echo "ℹ️  Nothing new to commit."
            exit 0
          fi

          push_batch() {
            local -a BATCH=("$@")
            for f in "${BATCH[@]}"; do git add "$f" 2>/dev/null || true; done
            git diff --cached --quiet && return 0
            git commit -m "[MR.MMD2019 v4.0] Add downloaded files [skip ci]" --quiet

            local retry=0
            while [ $retry -lt 5 ]; do
              if timeout 300 git push origin HEAD:"$BRANCH"; then
                echo "  ✅ Push succeeded."
                return 0
              fi
              retry=$((retry + 1))
              echo "  ⚠️  Push attempt ${retry}/5 failed — rebasing and retrying..."
              sleep $((3 + RANDOM % 5))
              git fetch origin "$BRANCH" --quiet
              if ! git rebase "origin/$BRANCH" --quiet 2>/dev/null; then
                echo "  ❌ Rebase conflict — aborting this batch."
                git rebase --abort 2>/dev/null || true
                return 1
              fi
            done
            echo "  ❌ Could not push batch after 5 attempts."
            return 1
          }

          declare -a BATCH=()
          for file in "${ALL_FILES[@]}"; do
            BATCH+=("$file")
            if [ "${#BATCH[@]}" -ge 3 ]; then
              push_batch "${BATCH[@]}" || {
                echo "❌ FATAL: push failed. Aborting."
                exit 1
              }
              BATCH=()
              git fetch origin "$BRANCH" --quiet
              git rebase "origin/$BRANCH" --quiet 2>/dev/null \
                || git rebase --abort
              cp -r "$BACKUP_DIR"/* DOWNLOAD/ 2>/dev/null || true
            fi
          done

          [ "${#BATCH[@]}" -gt 0 ] && push_batch "${BATCH[@]}" || true

          # Ensure index READMEs are up to date
          git fetch origin "$BRANCH"
          git rebase "origin/$BRANCH" --quiet 2>/dev/null || git rebase --abort
          git add DOWNLOAD/README.md DOWNLOAD/README_FA.md
          if ! git diff --cached --quiet; then
            git commit -m "[MR.MMD2019 v4.0] Update index READMEs [skip ci]"
            timeout 180 git push origin HEAD:"$BRANCH" \
              || echo "⚠️  Warning: final README push failed (non-fatal)."
          fi

          echo ""
          echo "════════════════════════════════════════════════════"
          echo "🎉 All files committed and pushed successfully."
          echo "════════════════════════════════════════════════════"
