          for ((idx=0; idx<TOTAL_URLS; idx++)); do
            PRIMARY_URL="${PRIMARY_URLS[$idx]}"
            FILENAME=$(sanitize_filename "$PRIMARY_URL")

            # FIX: Use declare -n nameref instead of eval (was unsafe/fragile)
            declare -a CANDIDATES=("$PRIMARY_URL")
            for MIRROR_VAR in MIRROR1_URLS MIRROR2_URLS MIRROR3_URLS \
                              MIRROR4_URLS MIRROR5_URLS MIRROR6_URLS; do
              declare -n _ARR="$MIRROR_VAR"
              if [ "${#_ARR[@]}" -gt "$idx" ] && [ -n "${_ARR[$idx]:-}" ]; then
                CANDIDATES+=("${_ARR[$idx]}")
              fi
              unset -n _ARR
            done

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📋 File $((idx+1))/${TOTAL_URLS}: ${FILENAME}"
            echo "   Primary : ${PRIMARY_URL}"
            echo "   Mirrors : $((${#CANDIDATES[@]}-1))"

            # ADD: Deduplication — skip if file already present in DOWNLOAD/
            if find DOWNLOAD -name "$FILENAME" -type f 2>/dev/null | grep -q .; then
              echo "⏭️  Skipping (already in DOWNLOAD/): ${FILENAME}"
              continue
            fi

            # Throttle: wait if too many running jobs
            # FIX: Replaced 'set -m' job control with direct pid-array approach
            while [ "${#JOB_PIDS[@]}" -ge "$MAX_PARALLEL" ]; do
              sleep 1
              declare -a ALIVE_PIDS=()
              for pid in "${JOB_PIDS[@]}"; do
                kill -0 "$pid" 2>/dev/null && ALIVE_PIDS+=("$pid") || true
              done
              JOB_PIDS=("${ALIVE_PIDS[@]}")
            done

            # Launch download in background subshell
            (
              # Reconstruct arrays from serialised exports
              IFS=$'\x01' read -r -a UA_POOL <<< "$UA_POOL_SERIAL"
              IFS=$'\x01' read -r -a COMMON_HEADERS <<< "$COMMON_HEADERS_SERIAL"

              export -f smart_download download_with_mirrors download_file \
                         compress_file process_normal process_zip \
                         write_readme write_readme_zip write_summary_json \
                         create_error_report get_ua human_bytes urlencode \
                         sanitize_filename get_unique_folder get_random_suffix \
                         elapsed_since http_status cleanup

              export BACKUP_DIR PRIMARY_UA UA_COUNT ZIP_PASSWORD \
                     COMPRESSION_LEVEL ARCHIVE_FORMAT MODE \
                     SMALL_FILE_THRESHOLD_MB CHUNK_SIZE_MB CHUNK_BYTES \
                     MAX_RETRIES CONNECT_TIMEOUT TRANSFER_TIMEOUT \
                     ARIA2_SPLITS ARIA2_CONNECTIONS OUTPUT_NAME \
                     REPO_OWNER REPO_NAME BRANCH MAX_CHUNK_PARALLEL \
                     UA_POOL_SERIAL COMMON_HEADERS_SERIAL

              if smart_download "$PRIMARY_URL" "$FILENAME" "${CANDIDATES[@]}"; then
                echo "⚙️  Post-processing: ${FILENAME}  mode=${MODE}"
                FILE="tmp_downloads/$FILENAME"
                if [ "$MODE" = "zip" ]; then
                  process_zip "$FILE"
                else
                  process_normal "$FILE"
                fi
                rm -f "$FILE"
              else
                echo "❌ Download pipeline failed for: $FILENAME"
              fi
            ) &
            JOB_PIDS+=($!)
          done

          # Wait for all background jobs
          echo ""
          echo "⏳ Waiting for all download jobs to finish..."
          for pid in "${JOB_PIDS[@]}"; do
            wait "$pid" || echo "⚠️  A background job exited with error (pid=$pid)."
          done

          echo ""
          echo "════════════════════════════════════════════════════"
          echo "✅ All downloads complete  [$(elapsed_since $GLOBAL_START)]"
          echo "════════════════════════════════════════════════════"
          echo ""
          echo "Backup directory contents:"
          find "$BACKUP_DIR" -type f | sort | head -80

      # ── 6. Copy results into DOWNLOAD/ and write index READMEs ──────────────
