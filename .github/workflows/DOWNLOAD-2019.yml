          ---

          ## 🌍 Persian / فارسی
          - رمز عبور: {"تنظیم شده است (از ادمین دریافت کنید)" if pw_label != "🔓 No" else "ندارد"}
          - روش استخراج: تمام پارت‌ها را دانلود کرده در یک پوشه قرار دهید و با WinRAR یا 7-Zip باز کنید.

          ---

