          }

          # ════════════════════════════════════════════════════════════════════
          # SECTION 14 — Orchestration
          # ════════════════════════════════════════════════════════════════════
          BACKUP_DIR="/tmp/download_backup_$$"
          mkdir -p "$BACKUP_DIR"
