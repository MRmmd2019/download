          PYEOF
          }

          # ADD: JSON summary writer for machine-readable results
          write_summary_json() {
            local FOLDER="$1" FNAME="$2" SIZE="$3" MODE_L="$4" \
                  FMT="$5" CHKSUM="$6" PARTS="$7"
