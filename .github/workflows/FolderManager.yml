name: 📂 Folder Manager (Sort & Delete)

on:
  workflow_dispatch:
    inputs:
      sort_option:
        description: 'Sort folders inside DOWNLOAD'
        required: true
        type: choice
        default: 'no-sort'
        options:
          - 'no-sort'
          - 'sort-az'
          - 'sort-za'
      folder_to_delete:
        description: 'Exact folder name to delete (type "none" to skip)'
        required: false
        type: string
        default: 'none'
      delete_all_folders:
        description: 'Delete ALL folders in DOWNLOAD (keeps README files)'
        required: false
        type: boolean
        default: false

jobs:
  manage-folders:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Display current folders
        run: |
          echo "📁 Current folders inside DOWNLOAD/:"
          if [ -d DOWNLOAD ]; then
            find DOWNLOAD -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort || echo "(none)"
          else
            echo "(DOWNLOAD folder does not exist yet)"
          fi

      - name: Validate inputs
        env:
          SORT_OPTION: ${{ github.event.inputs.sort_option }}
          FOLDER_TO_DELETE: ${{ github.event.inputs.folder_to_delete }}
          DELETE_ALL: ${{ github.event.inputs.delete_all_folders }}
        run: |
          SORT_OPTION="$SORT_OPTION"
          FOLDER_TO_DELETE="$FOLDER_TO_DELETE"
          DELETE_ALL="$DELETE_ALL"
          ERROR_MSG=""
          if [ "$DELETE_ALL" = "true" ] && [ "$SORT_OPTION" != "no-sort" ]; then
            ERROR_MSG="❌ Cannot sort while deleting all folders. Set sort to 'no-sort' or uncheck delete all."
          fi
          if [ "$DELETE_ALL" = "true" ] && [ "$FOLDER_TO_DELETE" != "none" ]; then
            ERROR_MSG="❌ Cannot delete a specific folder when 'Delete all folders' is checked."
          fi
          if [ "$FOLDER_TO_DELETE" != "none" ] && [ -d "DOWNLOAD" ]; then
            if [ ! -d "DOWNLOAD/$FOLDER_TO_DELETE" ]; then
              EXISTING=$(find DOWNLOAD -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort | tr '\n' ' ')
              ERROR_MSG="❌ Folder '${FOLDER_TO_DELETE}' not found. Available: ${EXISTING:-none}"
            fi
          fi
          if [ -n "$ERROR_MSG" ]; then
            echo "$ERROR_MSG"
            exit 1
          fi
          echo "✅ Inputs valid."

      - name: Perform folder operations
        env:
          SORT_OPTION: ${{ github.event.inputs.sort_option }}
          FOLDER_TO_DELETE: ${{ github.event.inputs.folder_to_delete }}
          DELETE_ALL: ${{ github.event.inputs.delete_all_folders }}
        run: |
          # غیرفعال کردن خروج خودکار برای جلوگیری از 128 ناگهانی
          set +e

          SORT_OPTION="$SORT_OPTION"
          FOLDER_TO_DELETE="$FOLDER_TO_DELETE"
          DELETE_ALL="$DELETE_ALL"
          DOWNLOAD_DIR="DOWNLOAD"

          if [ ! -d "$DOWNLOAD_DIR" ]; then
            echo "📁 DOWNLOAD directory does not exist. Nothing to do."
            exit 0
          fi

          # ۱. حذف پوشه خاص (با rm -rf معمولی، سپس add)
          if [ "$FOLDER_TO_DELETE" != "none" ]; then
            TARGET="$DOWNLOAD_DIR/$FOLDER_TO_DELETE"
            if [ -d "$TARGET" ]; then
              echo "🗑️ Removing $TARGET"
              rm -rf "$TARGET"
              echo "✅ Removed."
            else
              echo "⚠️ Folder '$FOLDER_TO_DELETE' not found, skipping."
            fi
          fi

          # ۲. حذف همه پوشه‌ها (به جز READMEها)
          if [ "$DELETE_ALL" = "true" ]; then
            echo "🗑️ Deleting all folders inside $DOWNLOAD_DIR..."
            # حذف همه دایرکتوری‌های سطح اول
            find "$DOWNLOAD_DIR" -mindepth 1 -maxdepth 1 -type d -exec rm -rf {} + 2>/dev/null || true
            # حذف فایل‌های اضافی (غیر از README)
            find "$DOWNLOAD_DIR" -maxdepth 1 -type f ! -name "README.md" ! -name "README_FA.md" -delete 2>/dev/null || true
            echo "✅ All folders deleted."
          fi

          # ۳. مرتب‌سازی (در صورت نیاز)
          if [ "$SORT_OPTION" != "no-sort" ]; then
            # لیست پوشه‌های باقی‌مانده
            mapfile -t dirs < <(find "$DOWNLOAD_DIR" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)
            if [ ${#dirs[@]} -eq 0 ]; then
              echo "📁 No folders to sort."
            else
              if [ "$SORT_OPTION" = "sort-za" ]; then
                mapfile -t dirs < <(printf '%s\n' "${dirs[@]}" | sort -r)
              else
                mapfile -t dirs < <(printf '%s\n' "${dirs[@]}" | sort)
              fi

              echo "Sorting folders: ${dirs[*]}"
              TEMP_PREFIX="sort_tmp_$$_"

              # مرحله اول: تغییر نام به نام موقت
              for i in "${!dirs[@]}"; do
                orig="$DOWNLOAD_DIR/${dirs[$i]}"
                tmp="$DOWNLOAD_DIR/${TEMP_PREFIX}${i}"
                if [ -d "$orig" ]; then
                  git mv "$orig" "$tmp" 2>/dev/null
                  if [ $? -ne 0 ]; then
                    echo "❌ git mv failed for $orig -> $tmp. Trying manual move + git add..."
                    mv "$orig" "$tmp"
                  fi
                fi
              done

              # مرحله دوم: تغییر نام به نام نهایی مرتب
              for i in "${!dirs[@]}"; do
                tmp="$DOWNLOAD_DIR/${TEMP_PREFIX}${i}"
                final="$DOWNLOAD_DIR/${dirs[$i]}"
                if [ -d "$tmp" ]; then
                  git mv "$tmp" "$final" 2>/dev/null
                  if [ $? -ne 0 ]; then
                    echo "❌ git mv failed for $tmp -> $final. Trying manual move + git add..."
                    mv "$tmp" "$final"
                  fi
                fi
              done
              echo "✅ Folders sorted."
            fi
          fi

          # ۴. Stage تمام تغییرات (حذف، اضافه، تغییر نام) در پوشه DOWNLOAD
          echo "📝 Staging changes in $DOWNLOAD_DIR..."
          git add -A "$DOWNLOAD_DIR"

          # ۵. بررسی وجود تغییرات و commit/push
          if ! git diff --cached --quiet; then
            echo "📦 Committing..."
            git commit -m "🔧 Folder management: sort/delete" || echo "⚠️ Commit had non-zero exit, but continuing."
            echo "🚀 Pushing to origin/${GITHUB_REF_NAME}..."
            git push origin "${GITHUB_REF_NAME}" || {
              echo "⚠️ Push failed, trying rebase..."
              git pull --rebase origin "${GITHUB_REF_NAME}"
              git push origin "${GITHUB_REF_NAME}"
            }
            echo "🎉 Changes pushed successfully."
          else
            echo "✅ No changes to push."
          fi

          # ۶. نمایش وضعیت نهایی
          echo "📁 Folders after operation:"
          find "$DOWNLOAD_DIR" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort || echo "(none)"
