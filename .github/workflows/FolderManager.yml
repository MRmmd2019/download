name: 📂 Folder Manager (Sort & Delete)

on:
  workflow_dispatch:
    inputs:
      sort_option:
        description: 'Sort folders inside DOWNLOAD'
        required: true
        type: choice
        default: 'no-sort'
        options:
          - 'no-sort'
          - 'sort-az'
          - 'sort-za'
      folder_to_delete:
        description: 'Exact folder name to delete (type "none" to skip)'
        required: false
        type: string
        default: 'none'
      delete_all_folders:
        description: 'Delete ALL folders in DOWNLOAD (keeps README files)'
        required: false
        type: boolean
        default: false

jobs:
  manage-folders:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Display current folders (informational)
        run: |
          echo "📁 Current folders inside DOWNLOAD/:"
          if [ -d DOWNLOAD ]; then
            find DOWNLOAD -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort || echo "(none)"
          else
            echo "(DOWNLOAD folder does not exist yet)"
          fi

      - name: Validate inputs against existing folders
        env:
          SORT_OPTION: ${{ github.event.inputs.sort_option }}
          FOLDER_TO_DELETE: ${{ github.event.inputs.folder_to_delete }}
          DELETE_ALL: ${{ github.event.inputs.delete_all_folders }}
        run: |
          SORT_OPTION="$SORT_OPTION"
          FOLDER_TO_DELETE="$FOLDER_TO_DELETE"
          DELETE_ALL="$DELETE_ALL"

          ERROR_MSG=""
          # Prevent sort + delete all
          if [ "$DELETE_ALL" = "true" ] && [ "$SORT_OPTION" != "no-sort" ]; then
            ERROR_MSG="❌ Cannot sort folders while deleting all of them. Please set 'Sort Option' to 'no-sort' or uncheck 'Delete all folders'."
          fi
          # Prevent specifying a specific folder while delete all is selected
          if [ "$DELETE_ALL" = "true" ] && [ "$FOLDER_TO_DELETE" != "none" ]; then
            ERROR_MSG="❌ Cannot delete a specific folder while 'Delete all folders' is checked. Either uncheck 'Delete all folders' or set 'Folder to delete' to 'none'."
          fi
          # If a specific folder is given, check its existence
          if [ "$FOLDER_TO_DELETE" != "none" ] && [ -d "DOWNLOAD" ]; then
            if [ ! -d "DOWNLOAD/$FOLDER_TO_DELETE" ]; then
              EXISTING=$(find DOWNLOAD -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort | tr '\n' ' ')
              ERROR_MSG="❌ Folder '${FOLDER_TO_DELETE}' not found in DOWNLOAD/. Available folders: ${EXISTING:-none}"
            fi
          fi
          if [ -n "$ERROR_MSG" ]; then
            echo "$ERROR_MSG"
            exit 1
          fi
          echo "✅ Inputs valid."

      - name: Perform folder operations
        env:
          SORT_OPTION: ${{ github.event.inputs.sort_option }}
          FOLDER_TO_DELETE: ${{ github.event.inputs.folder_to_delete }}
          DELETE_ALL: ${{ github.event.inputs.delete_all_folders }}
        run: |
          set -e  # Exit immediately on any error
          SORT_OPTION="$SORT_OPTION"
          FOLDER_TO_DELETE="$FOLDER_TO_DELETE"
          DELETE_ALL="$DELETE_ALL"
          DOWNLOAD_DIR="DOWNLOAD"

          # Ensure DOWNLOAD directory exists
          if [ ! -d "$DOWNLOAD_DIR" ]; then
            echo "📁 DOWNLOAD directory does not exist. Nothing to do."
            exit 0
          fi

          # Helper to remove a single directory via git
          remove_git_dir() {
            local dir="$1"
            echo "🗑️ Removing $dir"
            # Force remove even if it contains untracked files
            git rm -rf "$dir" || {
              echo "❌ git rm failed for $dir"
              return 1
            }
          }

          # 1. Deletion of specific folder (if any)
          if [ "$FOLDER_TO_DELETE" != "none" ]; then
            TARGET="$DOWNLOAD_DIR/$FOLDER_TO_DELETE"
            remove_git_dir "$TARGET"
          fi

          # 2. Delete all folders (keep README files at root)
          if [ "$DELETE_ALL" = "true" ]; then
            echo "🗑️ Deleting all folders inside $DOWNLOAD_DIR (root READMEs stay)..."
            while IFS= read -r -d '' dir; do
              remove_git_dir "$dir"
            done < <(find "$DOWNLOAD_DIR" -mindepth 1 -maxdepth 1 -type d -print0)

            # Remove stray files that are not the protected README
            while IFS= read -r -d '' file; do
              echo "🗑️ Removing stray file: $file"
              git rm -f "$file" || echo "⚠️ Could not remove $file"
            done < <(find "$DOWNLOAD_DIR" -maxdepth 1 -type f ! -name "README.md" ! -name "README_FA.md" -print0)
          fi

          # 3. Sorting (unchanged)
          if [ "$SORT_OPTION" != "no-sort" ]; then
            mapfile -t dirs < <(find "$DOWNLOAD_DIR" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)
            if [ ${#dirs[@]} -eq 0 ]; then
              echo "📁 No folders to sort."
              exit 0
            fi

            if [ "$SORT_OPTION" = "sort-za" ]; then
              mapfile -t dirs < <(printf '%s\n' "${dirs[@]}" | sort -r)
            else
              mapfile -t dirs < <(printf '%s\n' "${dirs[@]}" | sort)
            fi

            echo "Sorting folders: ${dirs[*]}"
            TEMP_PREFIX="temp_ren_$$_"
            for i in "${!dirs[@]}"; do
              orig="$DOWNLOAD_DIR/${dirs[$i]}"
              tmp="$DOWNLOAD_DIR/${TEMP_PREFIX}_${i}"
              if [ -d "$orig" ]; then
                git mv "$orig" "$tmp" || { echo "❌ Failed to rename $orig to $tmp"; exit 1; }
              fi
            done
            final_dirs=("${dirs[@]}")
            for i in "${!final_dirs[@]}"; do
              tmp="$DOWNLOAD_DIR/${TEMP_PREFIX}_${i}"
              final="$DOWNLOAD_DIR/${final_dirs[$i]}"
              if [ -d "$tmp" ]; then
                git mv "$tmp" "$final" || { echo "❌ Failed to rename to $final"; exit 1; }
              fi
            done
            echo "✅ Folders sorted successfully."
          fi

          # 4. Commit & push (explicit remote & branch)
          if ! git diff --cached --quiet; then
            echo "📝 Staging changes..."
            git status
            git commit -m "🔧 Folder management: sort/delete"
            echo "🚀 Pushing to origin/${GITHUB_REF_NAME}..."
            git push origin "${GITHUB_REF_NAME}" || {
              echo "⚠️ Push failed, attempting rebase..."
              git pull --rebase origin "${GITHUB_REF_NAME}"
              git push origin "${GITHUB_REF_NAME}"
            }
            echo "🎉 Changes pushed successfully."
          else
            echo "✅ No changes to push."
          fi

          # 5. Final verification
          echo "📁 Folders after operation:"
          find "$DOWNLOAD_DIR" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort || echo "(none)"
