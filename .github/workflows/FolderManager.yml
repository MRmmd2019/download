name: 🗑️ Delete entire DOWNLOAD folder

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DELETE" to confirm complete removal of the DOWNLOAD folder and all its contents.'
        required: true
        default: ''
        type: string

jobs:
  delete-download:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DELETE" ]; then
            echo "❌ You must type DELETE exactly to confirm. Aborting."
            exit 1
          fi
          echo "✅ Confirmation valid."

      - name: Remove DOWNLOAD folder completely
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          echo "🗑️ Removing DOWNLOAD folder entirely..."

          # حذف از ردیابی گیت (با چشم‌پوشی از خطا اگر فایلی track نباشد)
          git rm -rf DOWNLOAD/ 2>/dev/null || true

          # پاک‌سازی فیزیکی از روی دیسک
          rm -rf DOWNLOAD 2>/dev/null || true

          # Stage کردن حذف‌ها (git add -A تغییرات را ثبت می‌کند)
          git add -A

          # بررسی وجود تغییری برای commit
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit (DOWNLOAD folder may already be absent)."
            exit 0
          fi

          # Commit
          git commit -m "🗑️ Remove entire DOWNLOAD folder [skip ci]"

          echo "🚀 Pushing changes..."

          # Push با ریترای و rebase (همان روش اثبات‌شده)
          RETRY=0
          MAX_RETRIES=5
          while [ $RETRY -lt $MAX_RETRIES ]; do
            RETRY=$((RETRY + 1))

            git fetch origin "$BRANCH" --quiet 2>/dev/null || true
            git rebase origin/"$BRANCH" 2>/dev/null || {
              git rebase --abort 2>/dev/null || true
              git reset --hard origin/"$BRANCH" 2>/dev/null || true
              git pull --rebase origin "$BRANCH" 2>/dev/null || true
              # دوباره تغییرات را اعمال کن (در اینجا حذف DOWNLOAD)
              git rm -rf DOWNLOAD/ 2>/dev/null || true
              rm -rf DOWNLOAD 2>/dev/null || true
              git add -A
              git commit -m "🗑️ Remove entire DOWNLOAD folder [skip ci]" 2>/dev/null || true
            }

            if timeout 60 git push origin HEAD:"$BRANCH" 2>&1; then
              echo ""
              echo "=========================================="
              echo "✅ DOWNLOAD folder deleted successfully!"
              echo "=========================================="
              exit 0
            else
              echo "Push failed, retry $RETRY/$MAX_RETRIES..."
              sleep $((2 + RANDOM % 5))
            fi
          done

          echo "❌ Failed to push after $MAX_RETRIES attempts"
          exit 1
