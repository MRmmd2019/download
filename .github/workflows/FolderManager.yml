name: 📂 Folder Manager (Sort & Delete)

on:
  workflow_dispatch:
    inputs:
      sort_option:
        description: 'Sort folders inside DOWNLOAD'
        required: true
        type: choice
        default: 'no-sort'
        options:
          - 'no-sort'
          - 'sort-az'
          - 'sort-za'
      folder_to_delete:
        description: 'Exact folder name to delete (type "none" to skip)'
        required: false
        type: string
        default: 'none'
      delete_all_folders:
        description: 'Delete ALL folders in DOWNLOAD (keeps README files)'
        required: false
        type: boolean
        default: false

jobs:
  manage-folders:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Display current folders
        run: |
          echo "📁 Current folders inside DOWNLOAD/:"
          if [ -d DOWNLOAD ]; then
            find DOWNLOAD -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort || echo "(none)"
          else
            echo "(DOWNLOAD folder does not exist yet)"
          fi

      - name: Validate inputs
        env:
          SORT_OPTION: ${{ github.event.inputs.sort_option }}
          FOLDER_TO_DELETE: ${{ github.event.inputs.folder_to_delete }}
          DELETE_ALL: ${{ github.event.inputs.delete_all_folders }}
        run: |
          SORT_OPTION="$SORT_OPTION"
          FOLDER_TO_DELETE="$FOLDER_TO_DELETE"
          DELETE_ALL="$DELETE_ALL"
          ERROR_MSG=""
          if [ "$DELETE_ALL" = "true" ] && [ "$SORT_OPTION" != "no-sort" ]; then
            ERROR_MSG="❌ Cannot sort while deleting all folders. Set sort to 'no-sort' or uncheck delete all."
          fi
          if [ "$DELETE_ALL" = "true" ] && [ "$FOLDER_TO_DELETE" != "none" ]; then
            ERROR_MSG="❌ Cannot delete a specific folder when 'Delete all folders' is checked."
          fi
          if [ "$FOLDER_TO_DELETE" != "none" ] && [ -d "DOWNLOAD" ]; then
            if [ ! -d "DOWNLOAD/$FOLDER_TO_DELETE" ]; then
              EXISTING=$(find DOWNLOAD -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort | tr '\n' ' ')
              ERROR_MSG="❌ Folder '${FOLDER_TO_DELETE}' not found. Available: ${EXISTING:-none}"
            fi
          fi
          if [ -n "$ERROR_MSG" ]; then
            echo "$ERROR_MSG"
            exit 1
          fi
          echo "✅ Inputs valid."

      - name: Perform folder operations
        env:
          SORT_OPTION: ${{ github.event.inputs.sort_option }}
          FOLDER_TO_DELETE: ${{ github.event.inputs.folder_to_delete }}
          DELETE_ALL: ${{ github.event.inputs.delete_all_folders }}
        run: |
          SORT_OPTION="$SORT_OPTION"
          FOLDER_TO_DELETE="$FOLDER_TO_DELETE"
          DELETE_ALL="$DELETE_ALL"
          DOWNLOAD_DIR="DOWNLOAD"

          if [ ! -d "$DOWNLOAD_DIR" ]; then
            echo "📁 DOWNLOAD directory does not exist. Nothing to do."
            exit 0
          fi

          # Helper: remove a path from Git index and disk, ignore if not tracked
          safe_git_rm() {
            local path="$1"
            if [ -e "$path" ]; then
              echo "🗑️ Removing $path"
              # --ignore-unmatch prevents error if file not in index
              # -r for directories, -f to allow removal even if untracked files present
              git rm -rf --ignore-unmatch "$path" || echo "⚠️ Could not remove $path (maybe already removed)"
            else
              echo "ℹ️ Path $path does not exist, skipping."
            fi
          }

          # 1. Specific folder deletion
          if [ "$FOLDER_TO_DELETE" != "none" ]; then
            safe_git_rm "$DOWNLOAD_DIR/$FOLDER_TO_DELETE"
          fi

          # 2. Delete all folders (keep root READMEs)
          if [ "$DELETE_ALL" = "true" ]; then
            echo "🗑️ Deleting all folders inside $DOWNLOAD_DIR..."
            while IFS= read -r -d '' dir; do
              safe_git_rm "$dir"
            done < <(find "$DOWNLOAD_DIR" -mindepth 1 -maxdepth 1 -type d -print0)

            # Remove any stray files not being README
            while IFS= read -r -d '' file; do
              # double check it's not a README we want to keep
              case "$(basename "$file")" in
                README.md|README_FA.md) continue ;;
              esac
              echo "🗑️ Removing stray file: $file"
              git rm -f --ignore-unmatch "$file" || echo "⚠️ Could not remove $file"
            done < <(find "$DOWNLOAD_DIR" -maxdepth 1 -type f ! -name "README.md" ! -name "README_FA.md" -print0)
          fi

          # 3. Sorting
          if [ "$SORT_OPTION" != "no-sort" ]; then
            mapfile -t dirs < <(find "$DOWNLOAD_DIR" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)
            if [ ${#dirs[@]} -eq 0 ]; then
              echo "📁 No folders to sort."
              exit 0
            fi

            if [ "$SORT_OPTION" = "sort-za" ]; then
              mapfile -t dirs < <(printf '%s\n' "${dirs[@]}" | sort -r)
            else
              mapfile -t dirs < <(printf '%s\n' "${dirs[@]}" | sort)
            fi

            echo "Sorting folders: ${dirs[*]}"
            TEMP_PREFIX="sort_tmp_$$_"

            # First pass: rename to temporary names
            for i in "${!dirs[@]}"; do
              orig="$DOWNLOAD_DIR/${dirs[$i]}"
              tmp="$DOWNLOAD_DIR/${TEMP_PREFIX}${i}"
              if [ -d "$orig" ]; then
                git mv "$orig" "$tmp" || { echo "❌ Failed to rename $orig to $tmp"; exit 1; }
              fi
            done

            # Second pass: rename to final sorted names
            for i in "${!dirs[@]}"; do
              tmp="$DOWNLOAD_DIR/${TEMP_PREFIX}${i}"
              final="$DOWNLOAD_DIR/${dirs[$i]}"
              if [ -d "$tmp" ]; then
                git mv "$tmp" "$final" || { echo "❌ Failed to rename to $final"; exit 1; }
              fi
            done
            echo "✅ Folders sorted successfully."
          fi

          # 4. Commit & push
          if ! git diff --cached --quiet; then
            echo "📝 Committing changes..."
            git status
            git commit -m "🔧 Folder management: sort/delete"
            echo "🚀 Pushing to origin/${GITHUB_REF_NAME}..."
            git push origin "${GITHUB_REF_NAME}" || {
              echo "⚠️ Push failed, trying rebase..."
              git pull --rebase origin "${GITHUB_REF_NAME}"
              git push origin "${GITHUB_REF_NAME}"
            }
            echo "🎉 Changes pushed successfully."
          else
            echo "✅ No changes to push."
          fi

          # 5. Final listing
          echo "📁 Folders after operation:"
          find "$DOWNLOAD_DIR" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort || echo "(none)"
