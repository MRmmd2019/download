name: 🗑 Purge DOWNLOAD Directory

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DELETE to confirm complete removal of the DOWNLOAD folder (case‑sensitive)'
        required: true
        type: string
        default: ''

jobs:
  purge-download:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Validate confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DELETE" ]; then
            echo "❌ Confirmation failed. You must type exactly DELETE (all caps)."
            echo "   No changes were made to the repository."
            exit 1
          fi
          echo "✅ Confirmation accepted. Proceeding with deletion of DOWNLOAD/"

      - name: Purge DOWNLOAD directory
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          echo "🗑  Purging DOWNLOAD directory..."

          if [ ! -d "DOWNLOAD" ]; then
            echo "ℹ️  DOWNLOAD directory does not exist. Nothing to do."
            exit 0
          fi

          # Remove from Git tracking (ignore errors for untracked files)
          git rm -rf DOWNLOAD/ 2>/dev/null || true

          # Physically delete the folder from disk
          rm -rf DOWNLOAD 2>/dev/null || true

          # Stage all deletions (git add -A includes removals)
          git add -A

          if git diff --cached --quiet; then
            echo "ℹ️  No changes to commit – DOWNLOAD may already be empty."
            exit 0
          fi

          git commit -m "🗑 Purge DOWNLOAD directory [skip ci]"

          echo "🚀 Pushing changes to origin/${BRANCH}..."

          RETRY=0
          MAX_RETRIES=5
          while [ $RETRY -lt $MAX_RETRIES ]; do
            RETRY=$((RETRY + 1))

            git fetch origin "$BRANCH" --quiet 2>/dev/null || true
            git rebase origin/"$BRANCH" 2>/dev/null || {
              echo "⚠️  Rebase conflict – recovering..."
              git rebase --abort 2>/dev/null || true
              git reset --hard origin/"$BRANCH" 2>/dev/null || true
              git pull --rebase origin "$BRANCH" 2>/dev/null || true

              # Re‑apply the deletion after reset
              git rm -rf DOWNLOAD/ 2>/dev/null || true
              rm -rf DOWNLOAD 2>/dev/null || true
              git add -A
              git commit -m "🗑 Purge DOWNLOAD directory [skip ci]" 2>/dev/null || true
            }

            if timeout 60 git push origin HEAD:"$BRANCH" 2>&1; then
              echo ""
              echo "✅ DOWNLOAD directory permanently removed from repository."
              exit 0
            else
              echo "⏳ Push failed, attempt ${RETRY}/${MAX_RETRIES}. Retrying..."
              sleep $((2 + RANDOM % 5))
            fi
          done

          echo "❌ Push failed after ${MAX_RETRIES} attempts."
          echo "   Possible reasons: network issues, branch protection, or concurrent pushes."
          echo "   Please try again in a few minutes."
          exit 1
